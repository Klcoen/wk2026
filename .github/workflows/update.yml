name: WK2026 update

# Publiceert het dashboard naar de gh-pages-branch als een VERSE commit per run.
# Reden: in de "workflow"-Pages-modus publiceert GitHub alleen opnieuw bij een
# nieuwe commit-sha. De cron triggert steeds dezelfde sha, waardoor het verse
# bestand niet live kwam (site bevroor). Door elke run een nieuwe (orphan)
# commit naar gh-pages te force-pushen, is er altijd een nieuwe versie en
# publiceert Pages netjes. Bij 10-min cron = 6 builds/uur, ruim onder de limiet.

on:
  schedule:
    - cron: "20 * * * *"      # uur-backup (GitHub-cron is voor deze repo onbetrouwbaar)
  workflow_dispatch:          # door cron-job.org elke ~10 min aangeroepen
  push:
    branches: [main]          # ook bij elke codewijziging

permissions:
  contents: write             # nodig om naar gh-pages te pushen

concurrency:
  group: wk-publish
  cancel-in-progress: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dashboard genereren
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python wk_update_v15.py

      - name: Publiceren naar gh-pages (verse commit per run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p out
          cp wk_dashboard.html out/index.html
          touch out/.nojekyll            # Jekyll overslaan: serveer de HTML 1-op-1
          cd out
          git init -q
          git config user.email "actions@github.com"
          git config user.name "wk2026-bot"
          git add .
          git commit -q -m "publiceer $(date -u +%FT%TZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
