name: WK2026 update

on:
  schedule:
    # 1x per uur (op :20, weg van het hele uur). Rustige crons honoreert GitHub
    # betrouwbaar; hoogfrequente (*/5) werden hier afgeknepen. Een wedstrijd duurt
    # ~2 uur, dus de stand staat binnen een uur na het eindsignaal bij.
    - cron: "20 * * * *"
  workflow_dispatch:          # handmatig starten via de Actions-tab
  push:
    branches: [main]          # ook bij elke wijziging aan de repo

permissions:
  contents: read
  pages: write
  id-token: write

# Voorkom dat twee runs tegelijk publiceren
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dashboard genereren
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          python wk_update_v9.py
          mkdir -p _site
          cp wk_dashboard.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
